<svg xmlns="http://www.w3.org/2000/svg" width="760" height="860" viewBox="0 0 760 860" font-family="Roboto, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3ddc84"/>
      <stop offset="1" stop-color="#03a9f4"/>
    </linearGradient>
  </defs>

  <!-- HA dark background -->
  <rect width="760" height="860" fill="#111418"/>

  <!-- Header -->
  <text x="32" y="56" fill="#ffffff" font-size="30" font-weight="600">⚡ Veton EV Charger</text>
  <text x="32" y="80" fill="#7a8290" font-size="14">Charging</text>

  <!-- Card: Live Status -->
  <g transform="translate(32,104)">
    <rect width="696" height="196" rx="14" fill="#1c2026"/>
    <text x="20" y="34" fill="#9aa3af" font-size="13" letter-spacing="1.2">LIVE STATUS</text>
    <line x1="20" y1="48" x2="676" y2="48" stroke="#2a2f37"/>

    <text x="20" y="80" fill="#e6e9ee" font-size="16">🚗  Vehicle Status</text>
    <text x="676" y="80" fill="#3ddc84" font-size="16" font-weight="600" text-anchor="end">Charging</text>

    <text x="20" y="116" fill="#e6e9ee" font-size="16">⚡  Charging Power</text>
    <text x="676" y="116" fill="#ffffff" font-size="16" text-anchor="end">7.4 kW</text>

    <text x="20" y="152" fill="#e6e9ee" font-size="16">🔋  Session Energy</text>
    <text x="676" y="152" fill="#ffffff" font-size="16" text-anchor="end">12.3 kWh</text>

    <text x="20" y="184" fill="#e6e9ee" font-size="16">🔢  Total Energy</text>
    <text x="676" y="184" fill="#ffffff" font-size="16" text-anchor="end">1,284 kWh</text>
  </g>

  <!-- Card: Controls -->
  <g transform="translate(32,320)">
    <rect width="696" height="172" rx="14" fill="#1c2026"/>
    <text x="20" y="34" fill="#9aa3af" font-size="13" letter-spacing="1.2">CONTROLS</text>
    <line x1="20" y1="48" x2="676" y2="48" stroke="#2a2f37"/>

    <text x="20" y="82" fill="#e6e9ee" font-size="16">Charging</text>
    <rect x="628" y="68" width="48" height="22" rx="11" fill="url(#acc)"/>
    <circle cx="665" cy="79" r="9" fill="#ffffff"/>

    <text x="20" y="120" fill="#e6e9ee" font-size="16">Available</text>
    <rect x="628" y="106" width="48" height="22" rx="11" fill="url(#acc)"/>
    <circle cx="665" cy="117" r="9" fill="#ffffff"/>

    <text x="20" y="156" fill="#e6e9ee" font-size="16">Max Current</text>
    <line x1="300" y1="150" x2="640" y2="150" stroke="#2a2f37" stroke-width="4" stroke-linecap="round"/>
    <line x1="300" y1="150" x2="520" y2="150" stroke="url(#acc)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="520" cy="150" r="9" fill="#ffffff"/>
    <text x="676" y="156" fill="#ffffff" font-size="16" text-anchor="end">16 A</text>
  </g>

  <!-- Card: Phase Voltages -->
  <g transform="translate(32,512)">
    <rect width="338" height="140" rx="14" fill="#1c2026"/>
    <text x="20" y="34" fill="#9aa3af" font-size="13" letter-spacing="1.2">PHASE VOLTAGES</text>
    <text x="56" y="92" fill="#ffffff" font-size="20" text-anchor="middle">230.1</text>
    <text x="169" y="92" fill="#ffffff" font-size="20" text-anchor="middle">229.8</text>
    <text x="282" y="92" fill="#ffffff" font-size="20" text-anchor="middle">230.4</text>
    <text x="56" y="114" fill="#7a8290" font-size="13" text-anchor="middle">L1 · V</text>
    <text x="169" y="114" fill="#7a8290" font-size="13" text-anchor="middle">L2 · V</text>
    <text x="282" y="114" fill="#7a8290" font-size="13" text-anchor="middle">L3 · V</text>
  </g>

  <!-- Card: Phase Currents -->
  <g transform="translate(390,512)">
    <rect width="338" height="140" rx="14" fill="#1c2026"/>
    <text x="20" y="34" fill="#9aa3af" font-size="13" letter-spacing="1.2">PHASE CURRENTS</text>
    <text x="56" y="92" fill="#ffffff" font-size="20" text-anchor="middle">10.2</text>
    <text x="169" y="92" fill="#ffffff" font-size="20" text-anchor="middle">0.0</text>
    <text x="282" y="92" fill="#ffffff" font-size="20" text-anchor="middle">0.0</text>
    <text x="56" y="114" fill="#7a8290" font-size="13" text-anchor="middle">L1 · A</text>
    <text x="169" y="114" fill="#7a8290" font-size="13" text-anchor="middle">L2 · A</text>
    <text x="282" y="114" fill="#7a8290" font-size="13" text-anchor="middle">L3 · A</text>
  </g>

  <!-- Card: Charging Power (24h) -->
  <g transform="translate(32,672)">
    <rect width="696" height="156" rx="14" fill="#1c2026"/>
    <text x="20" y="34" fill="#9aa3af" font-size="13" letter-spacing="1.2">CHARGING POWER (24H)</text>
    <polyline fill="none" stroke="url(#acc)" stroke-width="3"
      points="24,128 90,128 150,126 210,70 320,66 430,72 520,60 600,118 676,128"/>
    <line x1="24" y1="132" x2="676" y2="132" stroke="#2a2f37"/>
  </g>

  <text x="32" y="852" fill="#5b6470" font-size="12">Illustrative mockup of the auto-provisioned dashboard — not a live screenshot.</text>
</svg>
